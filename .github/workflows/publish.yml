name: Publish to npm

# Triggers:
#   - Push a tag matching v*  (e.g. v0.1.1)  → publishes that version
#   - Manual run from the Actions tab        → publishes whatever's in package.json
#
# Required secret: NPM_TOKEN  (npm Granular Access Token with publish scope
# for n8n-nodes-acrelens). 2FA bypass is required for unattended publishes —
# select "Bypass" when creating the token.
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write   # required for npm provenance
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Publish to npm with provenance
        run: npm publish --access=public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
